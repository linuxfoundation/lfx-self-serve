<div class="flex min-h-screen bg-white">
  <!-- Auth-aware left rail. Hidden under `lg:`; below the breakpoint a compact top bar (see below)
       keeps the docs nav and sign-in CTA reachable on phones / tablets. -->
  @if (isAuthenticated()) {
    <!-- Authed: new rail (no lens buttons) + the lens sidebar. The previously-active lens tab stays
         selected; no menu item is active on a /docs route, giving the user a way back to their lens. -->
    <div class="hidden lg:flex flex-row flex-shrink-0 fixed left-0 top-0 bottom-0 z-40">
      <div class="w-[48px] flex-shrink-0" data-testid="docs-shell-authed">
        <lfx-lens-switcher [showLensButtons]="false" />
      </div>
      <div class="w-[300px] flex-shrink-0">
        <lfx-sidebar
          [items]="sidebarItems()"
          [showMeSelector]="activeLens() === 'me'"
          [showProjectSelector]="activeLens() === 'project' || activeLens() === 'foundation'"
          [showOrgSelector]="activeLens() === 'org'" />
      </div>
    </div>
  } @else {
    <!-- Public: minimal docs rail (docs icon + What's new + sign-in CTA). -->
    <div class="hidden lg:block flex-shrink-0 fixed left-0 top-0 bottom-0 z-40 w-16">
      <lfx-docs-sidebar-nav data-testid="docs-shell-public" />
    </div>
  }

  <!-- Main content -->
  <main class="flex flex-1 flex-col" [ngClass]="isAuthenticated() ? 'lg:ml-[348px]' : 'lg:ml-16'" data-testid="docs-content">
    <!-- Mobile / tablet top bar — surfaces the same docs and sign-in/account affordances
         that the lg+ left rail provides. Hidden at lg+ where the rail does the same job. -->
    <div class="flex items-center justify-between border-b border-gray-200 bg-white px-4 py-3 lg:hidden" data-testid="docs-shell-mobile">
      <a
        routerLink="/docs"
        class="flex items-center gap-2 text-sm font-semibold text-gray-900"
        data-testid="docs-shell-mobile-home"
        aria-label="LFX Documentation home">
        <i class="fa-light fa-book text-blue-600" aria-hidden="true"></i>
        <span>LFX Documentation</span>
      </a>
      @if (!isAuthenticated()) {
        <a
          [href]="signInHref()"
          class="rounded-md border border-blue-500 px-3 py-1.5 text-xs font-semibold text-blue-700 hover:bg-blue-50"
          data-testid="docs-shell-mobile-signin">
          Sign in
        </a>
      } @else {
        <a routerLink="/" class="text-xs font-semibold text-blue-700 hover:underline" data-testid="docs-shell-mobile-app"> Back to app </a>
      }
    </div>

    <div class="flex-grow px-[32px] pb-[100px]">
      <router-outlet />
    </div>

    <!-- App footer — constrained to the 1024px docs content width -->
    <lfx-footer class="mx-auto mt-auto w-full max-w-[1024px] p-8" cookie-tracking="true"></lfx-footer>
  </main>
</div>
