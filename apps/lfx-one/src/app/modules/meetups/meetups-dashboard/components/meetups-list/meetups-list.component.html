<div data-testid="meetups-list">
  <!-- Tab Content -->
  @if (activeTab() === 'upcoming') {
    @if (!upcomingMeetupsLoading() && upcomingMeetups().data.length === 0) {
      @if (isFiltered()) {
        <lfx-empty-state
          [withCard]="false"
          icon="fa-light fa-eyes"
          title="No results found"
          subtitle="Try adjusting your filter criteria"
          ctaLabel="Reset filters"
          ctaIcon="fa-light fa-arrow-rotate-left"
          (ctaClick)="resetFilters.emit()"
          data-testid="meetups-upcoming-empty-state" />
      } @else {
        <lfx-empty-state
          [withCard]="false"
          icon="fa-light fa-calendar"
          title="No upcoming meetups"
          subtitle="Upcoming meetups will appear here."
          data-testid="meetups-upcoming-empty-state" />
      }
    } @else {
      <lfx-meetups-table
        [meetupsResponse]="upcomingMeetups()"
        [loading]="upcomingMeetupsLoading()"
        [sortField]="upcomingSortField()"
        [sortOrder]="upcomingSortOrder()"
        (pageChange)="onUpcomingPageChange($event)"
        (sortChange)="onUpcomingSortChange($event)"
        data-testid="meetups-upcoming-table" />
    }
  } @else {
    @if (!pastMeetupsLoading() && pastMeetups().data.length === 0) {
      @if (isFiltered()) {
        <lfx-empty-state
          [withCard]="false"
          icon="fa-light fa-eyes"
          title="No results found"
          subtitle="Try adjusting your filter criteria"
          ctaLabel="Reset filters"
          ctaIcon="fa-light fa-arrow-rotate-left"
          (ctaClick)="resetFilters.emit()"
          data-testid="meetups-past-empty-state" />
      } @else {
        <lfx-empty-state
          [withCard]="false"
          icon="fa-light fa-calendar"
          title="No past meetups"
          subtitle="Meetups you've participated in will appear here."
          data-testid="meetups-past-empty-state" />
      }
    } @else {
      <lfx-meetups-table
        [meetupsResponse]="pastMeetups()"
        [isPastMeetups]="true"
        [loading]="pastMeetupsLoading()"
        [sortField]="pastSortField()"
        [sortOrder]="pastSortOrder()"
        (pageChange)="onPastPageChange($event)"
        (sortChange)="onPastSortChange($event)"
        data-testid="meetups-past-table" />
    }
  }
</div>
