<div class="w-full pb-12" data-testid="profile-attribution">
  <div class="flex flex-col gap-10">
    <!-- Work history -->
    <div class="flex flex-col gap-3">
      <div class="flex items-center justify-between">
        <h2>Work history</h2>
        @if (!isWorkExperienceEmpty()) {
          <lfx-button
            label="Add work experience"
            icon="fa-light fa-plus"
            severity="primary"
            [text]="true"
            size="small"
            [disabled]="impersonating()"
            [ariaLabel]="impersonating() ? 'This action is unavailable while impersonating another user' : undefined"
            (onClick)="onAddWorkExperience()"
            data-testid="add-work-experience-header-btn" />
        }
      </div>
      <lfx-profile-work-experience [hideHeader]="true" (workExperienceChanged)="onWorkExperienceChanged()" />
    </div>

    <!-- Project Involvement -->
    <div class="flex flex-col gap-3">
      <h2>Project Involvement</h2>
      <lfx-profile-affiliations [hideHeader]="true" [compact]="true" (addWorkExperience)="onAddWorkExperience()" />
    </div>
  </div>
</div>
