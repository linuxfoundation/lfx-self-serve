<div class="flex flex-col" data-testid="donation-history-table">
  @if (items().length === 0) {
    <lfx-empty-state
      icon="fa-light fa-hand-holding-heart"
      title="No donations yet"
      subtitle="Your donation history will appear here once you contribute to an initiative."
      ctaLabel="Explore Initiatives"
      [ctaHref]="exploreUrl()"
      ctaTarget="_blank"
      ctaRel="noopener noreferrer"
      [ctaGhost]="true"
      [ctaSize]="undefined"
      data-testid="donation-history-empty-state" />
  } @else {
    <div class="overflow-x-auto rounded-lg border border-gray-200">
      <table class="w-full text-sm" aria-label="Donation history">
        <thead>
          <tr class="border-b border-gray-200 bg-gray-50">
            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Initiative</th>
            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Date</th>
            <th scope="col" class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">Amount</th>
            <!-- Invoice column hidden until invoice downloads are available -->
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 bg-white">
          @for (item of items(); track item.id) {
            <tr class="hover:bg-gray-50 transition-colors" [attr.data-testid]="'donation-row-' + item.id">
              <!-- Initiative -->
              <td class="px-4 py-3">
                <div class="flex items-center gap-2">
                  <span class="font-medium text-gray-900">{{ item.initiativeName }}</span>
                  @if (item.recurring) {
                    <lfx-tag value="Recurring" severity="info" [rounded]="true" data-testid="donation-recurring-tag" />
                  }
                </div>
              </td>

              <!-- Date -->
              <td class="px-4 py-3 text-gray-500 whitespace-nowrap">{{ item.date | date: 'MMM d, y' : 'UTC' }}</td>

              <!-- Amount -->
              <td class="px-4 py-3 text-right font-semibold text-gray-900 whitespace-nowrap">{{ item.amountCents / 100 | currency: 'USD' }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    @if (hasMore()) {
      <div class="flex justify-center pt-3" data-testid="donation-history-load-more">
        <lfx-button label="Load more" severity="secondary" size="small" [loading]="loadingMore()" [disabled]="loadingMore()" (onClick)="onLoadMore()" />
      </div>
    }
  }
</div>
