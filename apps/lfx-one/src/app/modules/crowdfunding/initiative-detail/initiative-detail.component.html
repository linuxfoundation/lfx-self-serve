<div class="flex flex-col gap-5 p-8" data-testid="initiative-detail">
  <lfx-button
    label="Back to My Initiatives"
    icon="fa-light fa-chevron-left"
    severity="secondary"
    size="small"
    [text]="true"
    routerLink="/crowdfunding/initiatives"
    styleClass="self-start"
    data-testid="initiative-detail-back-btn" />

  @if (isLoading()) {
    <lfx-route-loading data-testid="initiative-detail-loading" />
  } @else if (initiative(); as detail) {
    <lfx-initiative-detail-header
      [initiative]="detail"
      [activeTab]="activeTab()"
      (tabChange)="activeTab.set($event)"
      (settingsClick)="settingsDrawerVisible.set(true)"
      (statusChange)="onStatusChange($event)" />

    <lfx-initiative-settings-drawer [initiative]="detail" [(visible)]="settingsDrawerVisible" (initiativeSaved)="onInitiativeSaved($event)" />

    @if (activeTab() === 'overview') {
      <lfx-initiative-overview [initiative]="detail" (viewAllFinancials)="activeTab.set('financials')" />
    } @else {
      <lfx-initiative-financials [initiative]="detail" />
    }
  }
</div>
