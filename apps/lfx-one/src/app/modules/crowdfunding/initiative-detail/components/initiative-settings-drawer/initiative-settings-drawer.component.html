<p-drawer
  [(visible)]="visible"
  position="right"
  [modal]="true"
  [showCloseIcon]="false"
  styleClass="xl:w-[600px] lg:w-[55%] md:w-[70%] sm:w-[90%] w-full"
  data-testid="initiative-settings-drawer">
  <ng-template #header>
    <div class="flex items-start justify-between gap-4 w-full">
      <div class="flex flex-col gap-0.5 flex-1">
        <h2 class="text-lg font-semibold text-gray-900" data-testid="initiative-settings-drawer-title">Initiative Settings</h2>
        <p class="text-sm text-gray-500">{{ initiative().name }}</p>
      </div>
      <button
        type="button"
        (click)="onClose()"
        class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-md transition-colors flex-shrink-0"
        aria-label="Close panel"
        data-testid="initiative-settings-drawer-close">
        <i class="fa-light fa-xmark text-xl pointer-events-none"></i>
      </button>
    </div>
  </ng-template>

  <div class="flex flex-col gap-6 pb-2 overflow-x-hidden" data-testid="initiative-settings-drawer-content">
    <!-- Tab bar -->
    <div role="tablist" class="flex items-center border-b border-gray-200 -mx-6 px-6 -mt-2" data-testid="initiative-settings-tabs">
      @for (tab of settingsTabs; track tab.value) {
        <button
          type="button"
          class="relative px-4 py-2.5 text-sm font-medium transition-colors whitespace-nowrap"
          [class]="activeSettingsTab() === tab.value ? 'text-blue-600' : 'text-gray-500 hover:text-gray-800'"
          (click)="activeSettingsTab.set(tab.value)"
          role="tab"
          [attr.aria-selected]="activeSettingsTab() === tab.value"
          [attr.aria-controls]="'settings-panel-' + tab.value"
          [attr.id]="'settings-tab-' + tab.value"
          [attr.data-testid]="'settings-tab-' + tab.value">
          {{ tab.label }}
          @if (activeSettingsTab() === tab.value) {
            <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-blue-600 rounded-full"></div>
          }
        </button>
      }
    </div>

    <!-- Tab panels — all rendered, CSS-hidden when inactive to preserve state across tab navigation -->
    <lfx-settings-details-tab
      id="settings-panel-details"
      role="tabpanel"
      aria-labelledby="settings-tab-details"
      [class.hidden]="activeSettingsTab() !== 'details'"
      [visible]="visible()"
      [initiative]="initiative()" />
    <lfx-settings-branding-tab
      id="settings-panel-branding"
      role="tabpanel"
      aria-labelledby="settings-tab-branding"
      [class.hidden]="activeSettingsTab() !== 'branding'"
      [visible]="visible()"
      [initiative]="initiative()" />
    <lfx-settings-beneficiaries-tab
      id="settings-panel-beneficiaries"
      role="tabpanel"
      aria-labelledby="settings-tab-beneficiaries"
      [class.hidden]="activeSettingsTab() !== 'beneficiaries'"
      [visible]="visible()"
      [initiative]="initiative()" />
    <lfx-settings-funding-tab
      id="settings-panel-funding"
      role="tabpanel"
      aria-labelledby="settings-tab-funding"
      [class.hidden]="activeSettingsTab() !== 'funding'"
      [visible]="visible()"
      [initiative]="initiative()" />
    <lfx-settings-announcements-tab
      id="settings-panel-announcements"
      role="tabpanel"
      aria-labelledby="settings-tab-announcements"
      [class.hidden]="activeSettingsTab() !== 'announcements'"
      [visible]="visible()"
      [initiative]="initiative()" />

    <!-- Footer actions -->
    <div class="flex justify-end gap-2 pt-4 border-t border-gray-200 mt-auto" data-testid="initiative-settings-footer">
      <lfx-button label="Cancel" severity="secondary" [disabled]="saving()" (onClick)="onClose()" data-testid="initiative-settings-cancel-btn" />
      <lfx-button
        label="Save changes"
        severity="primary"
        [loading]="saving()"
        [disabled]="saving()"
        (onClick)="onSave()"
        data-testid="initiative-settings-save-btn" />
    </div>
  </div>
</p-drawer>
