@if (display(); as organizer) {
  <lfx-tag
    [value]="organizer.label"
    severity="secondary"
    icon="fa-light fa-user"
    [pTooltip]="organizer.count > 1 ? allNames() : ''"
    data-testid="meeting-organizer">
  </lfx-tag>
}
