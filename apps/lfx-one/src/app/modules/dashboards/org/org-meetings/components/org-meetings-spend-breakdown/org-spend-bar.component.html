<div class="rounded-xl border border-gray-200 bg-white p-4" [attr.data-testid]="'org-spend-bar-' + titleSlug()">
  <div class="mb-3.5 flex items-center gap-2">
    <i [class]="icon()" class="text-base text-blue-600" aria-hidden="true"></i>
    <span class="text-sm font-medium text-gray-900">{{ title() }}</span>
  </div>
  <div class="flex flex-col gap-3">
    @for (segment of rows(); track segment.label) {
      <div
        class="relative"
        [class.group]="!!segment.others?.length"
        [attr.tabindex]="segment.others?.length ? 0 : null"
        [attr.aria-describedby]="segment.others?.length ? 'org-spend-bar-' + titleSlug() + '-' + $index + '-others-popover' : null"
        [class.mt-1]="segment.isOther"
        [class.border-t]="segment.isOther"
        [class.border-dashed]="segment.isOther"
        [class.border-gray-200]="segment.isOther"
        [class.pt-3]="segment.isOther">
        <div class="mb-1 flex items-center justify-between gap-2.5">
          <span class="text-xs" [class]="segment.isOther ? 'text-gray-400' : 'text-gray-900'">{{ segment.label }}</span>
          <span class="text-xs font-medium" [class]="segment.isOther ? 'text-gray-400' : 'text-gray-900'">{{ segment.pct }}%</span>
        </div>
        <div class="h-1.5 w-full overflow-hidden rounded-full" [class]="segment.isOther ? 'bg-gray-100' : 'bg-blue-100'">
          <div class="h-1.5 rounded-full" [class]="segment.isOther ? 'bg-gray-300' : 'bg-blue-600'" [style.width.%]="segment.pct"></div>
        </div>
        @if (segment.others?.length) {
          <div
            role="tooltip"
            class="pointer-events-none absolute top-full right-0 z-10 mt-2 hidden w-56 rounded-lg border border-gray-200 bg-white p-3 shadow-lg group-hover:block group-focus-within:block"
            [attr.data-testid]="'org-spend-bar-' + titleSlug() + '-others-popover'">
            <p class="mb-2 text-xs font-medium text-gray-500">Breakdown</p>
            <div class="flex flex-col gap-1.5">
              @for (item of segment.others; track item.label) {
                <div class="flex items-center justify-between gap-2 text-xs">
                  <span class="text-gray-700">{{ item.label }}</span>
                  <span class="font-medium text-gray-900">{{ item.pct }}%</span>
                </div>
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
