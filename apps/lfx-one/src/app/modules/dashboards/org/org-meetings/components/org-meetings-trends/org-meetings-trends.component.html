<section class="flex flex-col gap-4" data-testid="org-meetings-trends">
  <div class="flex items-center gap-3">
    <h2 class="flex shrink-0 items-center gap-2 text-base font-medium text-gray-900">
      <i class="fa-light fa-chart-line text-lg" aria-hidden="true"></i>
      <span>How this has changed over time</span>
    </h2>
    <div class="flex-1 self-center border-t border-gray-200"></div>
  </div>
  <div class="flex flex-wrap gap-4">
    @for (card of cards(); track card.title) {
      <lfx-metric-card
        [title]="card.title"
        [icon]="card.icon"
        [testId]="card.testId"
        chartType="bar"
        [chartData]="card.chartData"
        [chartOptions]="chartOptions"
        [value]="card.value"
        [subtitle]="card.subtitle" />
    }
  </div>
</section>
