<main class="container mx-auto flex flex-col gap-6 px-4 sm:px-6 lg:px-8" data-testid="org-meetings-page">
  <header class="flex flex-col gap-1">
    <h1 class="font-display font-light text-2xl">Meetings</h1>
    <p class="text-sm text-gray-500">Coordinate decisions, align stakeholders, and maintain transparent governance across your foundations.</p>
  </header>

  <lfx-stat-card-grid [cards]="kpiCards()" [loading]="summaryLoading()" [columns]="2" data-testid="org-meetings-kpi-strip" />

  <div class="bg-white rounded-lg border border-gray-200 p-4 mb-8" data-testid="org-meetings-filter-bar">
    <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-4">
      <div class="flex flex-wrap items-center gap-2" data-testid="org-meetings-tab-bar">
        @for (tab of tabs; track tab.id) {
          <button
            type="button"
            [class]="
              activeTab() === tab.id
                ? 'px-3 py-1 rounded-full text-sm transition-colors bg-blue-500 text-white'
                : 'px-3 py-1 rounded-full text-sm transition-colors bg-gray-100 text-gray-700 hover:bg-gray-200'
            "
            [attr.aria-pressed]="activeTab() === tab.id"
            [attr.data-testid]="'org-meetings-tab-' + tab.id"
            (click)="switchTab(tab.id)">
            {{ tab.label }}
          </button>
        }
      </div>

      @if (activeTab() === 'upcoming') {
        <div class="flex flex-wrap items-center gap-2">
          <button
            type="button"
            [class]="
              pendingRsvpOnly()
                ? 'px-3 py-1 rounded-full text-sm transition-colors bg-blue-500 text-white'
                : 'px-3 py-1 rounded-full text-sm transition-colors bg-gray-100 text-gray-700 hover:bg-gray-200'
            "
            [attr.aria-pressed]="pendingRsvpOnly()"
            data-testid="org-meetings-pending-rsvp-toggle"
            (click)="togglePendingRsvpOnly()">
            Pending RSVP
          </button>
        </div>
      }

      <div class="flex-1">
        <label for="org-meetings-search-id" class="sr-only">Search meetings</label>
        <lfx-input-text
          [form]="filterForm"
          control="search"
          id="org-meetings-search-id"
          placeholder="Search meetings..."
          icon="fa-light fa-search"
          size="small"
          styleClass="w-full"
          data-testid="org-meetings-search" />
      </div>

      <div class="w-full sm:w-48">
        <label for="org-meetings-project-filter-id" class="sr-only">Filter by project</label>
        <lfx-select
          [form]="filterForm"
          control="project"
          [options]="projectOptions()"
          placeholder="All Projects"
          inputId="org-meetings-project-filter-id"
          ariaLabel="Filter by project"
          [showClear]="true"
          styleClass="w-full"
          data-testid="org-meetings-project-filter" />
      </div>

      <div class="w-full sm:w-64">
        <label for="org-meetings-type-filter-id" class="sr-only">Filter by meeting type</label>
        <lfx-select
          [form]="filterForm"
          control="type"
          [options]="typeOptions"
          placeholder="All Types"
          inputId="org-meetings-type-filter-id"
          ariaLabel="Filter by meeting type"
          [showClear]="true"
          styleClass="w-full"
          data-testid="org-meetings-type-filter" />
      </div>
    </div>
  </div>

  @if (activeTab() === 'upcoming') {
    <lfx-org-upcoming-meetings
      [meetings]="upcomingMeetings()"
      [loading]="listLoading()"
      [loadingMore]="loadingMore()"
      [loadMoreError]="loadMoreError()"
      [error]="listError()"
      [orgName]="orgName()"
      [hasMore]="hasMore()"
      (retry)="retryUpcoming()"
      (loadMore)="loadMore()"
      data-testid="org-meetings-upcoming-tab" />
  }
  @if (activeTab() === 'past') {
    <lfx-org-past-meetings [meetings]="filteredPast()" [loading]="false" [orgName]="orgName()" data-testid="org-meetings-past-tab" />
  }
</main>
