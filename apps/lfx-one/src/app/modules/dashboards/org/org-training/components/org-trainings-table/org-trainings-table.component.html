<lfx-table
  [value]="trainingsResponse().data"
  [loading]="loading()"
  [lazy]="true"
  [paginator]="trainingsResponse().total > 0"
  [rows]="trainingsResponse().pageSize"
  [first]="trainingsResponse().offset"
  [totalRecords]="trainingsResponse().total"
  [rowsPerPageOptions]="rppOptions()"
  [showCurrentPageReport]="true"
  [showFirstLastIcon]="false"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
  paginatorPosition="bottom"
  (onPage)="onPageChange($event)"
  data-testid="org-trainings-data-table">
  <ng-template #header>
    <tr>
      <th scope="col" [attr.aria-sort]="sortAriaMap()['COURSE_NAME']" data-testid="sort-course-name">
        <button
          type="button"
          class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium"
          (click)="onHeaderClick('COURSE_NAME')">
          Name <i [class]="sortIcons()['COURSE_NAME']" aria-hidden="true"></i>
        </button>
      </th>
      <th scope="col" [attr.aria-sort]="sortAriaMap()['FOUNDATION_NAME']" data-testid="sort-foundation">
        <button
          type="button"
          class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium"
          (click)="onHeaderClick('FOUNDATION_NAME')">
          Foundation <i [class]="sortIcons()['FOUNDATION_NAME']" aria-hidden="true"></i>
        </button>
      </th>
      <th scope="col" [attr.aria-sort]="sortAriaMap()['LEVEL']" data-testid="sort-level">
        <button type="button" class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium" (click)="onHeaderClick('LEVEL')">
          Level <i [class]="sortIcons()['LEVEL']" aria-hidden="true"></i>
        </button>
      </th>
      <th scope="col" [attr.aria-sort]="sortAriaMap()['COMPLETED_COUNT']" data-testid="sort-completed">
        <button
          type="button"
          class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium"
          (click)="onHeaderClick('COMPLETED_COUNT')">
          Completed <i [class]="sortIcons()['COMPLETED_COUNT']" aria-hidden="true"></i>
        </button>
      </th>
      <th scope="col" [attr.aria-sort]="sortAriaMap()['IN_PROGRESS_COUNT']" data-testid="sort-in-progress">
        <button
          type="button"
          class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium"
          (click)="onHeaderClick('IN_PROGRESS_COUNT')">
          In Progress <i [class]="sortIcons()['IN_PROGRESS_COUNT']" aria-hidden="true"></i>
        </button>
      </th>
    </tr>
  </ng-template>

  <ng-template #body let-training let-rowIndex="rowIndex">
    <tr [attr.data-row-index]="rowIndex" [attr.data-testid]="'org-training-row-' + training.courseId">
      <td>
        <span class="text-sm font-medium text-gray-900" [attr.data-testid]="'org-training-name-' + training.courseId">
          {{ training.name }}
        </span>
      </td>

      <td>
        @if (training.foundation) {
          <lfx-tag [value]="training.foundation" styleClass="tag-neutral" [attr.data-testid]="'org-training-foundation-' + training.courseId" />
        } @else {
          <span class="text-xs text-gray-400">&mdash;</span>
        }
      </td>

      <td>
        @if (training.level) {
          <lfx-tag [value]="training.level" styleClass="tag-neutral" [attr.data-testid]="'org-training-level-' + training.courseId" />
        } @else {
          <span class="text-xs text-gray-400">&mdash;</span>
        }
      </td>

      <td [attr.data-testid]="'org-training-completed-' + training.courseId">
        @if (training.completedCount > 0) {
          <button
            type="button"
            class="text-sm text-gray-900 whitespace-nowrap hover:underline focus-visible:underline focus-visible:outline-none"
            (click)="completedClick.emit(training)">
            {{ training.completedCount | number }}
          </button>
        } @else {
          <span class="text-xs text-gray-400">&mdash;</span>
        }
      </td>

      <td [attr.data-testid]="'org-training-in-progress-' + training.courseId">
        @if (training.inProgressCount > 0) {
          <button
            type="button"
            class="text-sm text-gray-900 whitespace-nowrap hover:underline focus-visible:underline focus-visible:outline-none"
            (click)="inProgressClick.emit(training)">
            {{ training.inProgressCount | number }}
          </button>
        } @else {
          <span class="text-xs text-gray-400">&mdash;</span>
        }
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="5" class="text-center py-10">
        <div class="flex items-center justify-center p-16">
          <div class="text-center max-w-md">
            <div class="text-gray-400 mb-4">
              <i class="fa-light fa-book-open text-3xl mb-4" aria-hidden="true"></i>
              <h3 class="text-gray-600 mt-2">{{ emptyStateTitle() }}</h3>
              <p class="text-sm text-gray-400 mt-1">{{ emptyStateSubtitle() }}</p>
            </div>
            <a [href]="browseUrl" target="_blank" rel="noopener noreferrer" class="lfx-table-name-link text-sm" data-testid="org-trainings-browse-link">
              Browse trainings
            </a>
          </div>
        </div>
      </td>
    </tr>
  </ng-template>
</lfx-table>
