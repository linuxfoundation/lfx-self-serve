<div class="container mx-auto px-4 sm:px-6 lg:px-8" data-testid="project-dashboard-container">
  @if (selectedProject()) {
    <div class="mt-3 mb-6" data-testid="project-dashboard-foundation-project">
      <h1 class="font-display font-light text-2xl">{{ selectedProject()?.name }} Overview</h1>
    </div>
  }

  <div class="flex flex-col xl:flex-row xl:items-start xl:gap-10 gap-10" data-testid="project-dashboard-sections-grid">
    <div class="flex flex-col gap-10 flex-1 min-w-0 order-2 xl:order-1">
      @defer (on idle) {
        <lfx-recent-progress />
      } @placeholder {
        <section data-testid="project-dashboard-recent-progress-placeholder">
          <div class="flex items-center justify-between mb-4">
            <p-skeleton width="10rem" height="1.5rem" />
            <div class="flex items-center gap-2">
              <p-skeleton width="2rem" height="2rem" borderRadius="4px" />
              <p-skeleton width="2rem" height="2rem" borderRadius="4px" />
            </div>
          </div>
          <div class="flex gap-4 overflow-hidden">
            @for (i of [1, 2, 3, 4]; track i) {
              <div class="p-4 bg-white border border-gray-200 rounded-lg flex-shrink-0 w-[calc(100vw-3rem)] md:w-80">
                <div class="flex flex-col gap-2">
                  <div class="flex items-center gap-2">
                    <p-skeleton width="1rem" height="1rem" borderRadius="4px" />
                    <p-skeleton width="6rem" height="0.875rem" />
                  </div>
                  <div class="mt-3 w-full h-16">
                    <p-skeleton width="100%" height="100%" borderRadius="8px" />
                  </div>
                  <div class="flex flex-col gap-1 mt-auto">
                    <p-skeleton width="3rem" height="1.75rem" />
                    <p-skeleton width="70%" height="0.75rem" />
                  </div>
                </div>
              </div>
            }
          </div>
        </section>
      }

      @defer (on idle) {
        <lfx-my-meetings />
      } @placeholder {
        <section class="flex flex-col flex-1" data-testid="project-dashboard-my-meetings-placeholder">
          <div class="flex items-center justify-between mb-4 h-8">
            <div class="flex items-center gap-2">
              <p-skeleton width="1.125rem" height="1.125rem" borderRadius="4px" />
              <p-skeleton width="7rem" height="1rem" />
            </div>
            <p-skeleton width="4rem" height="1rem" />
          </div>
          <div class="flex flex-col gap-3">
            <p-skeleton width="100%" height="140px" />
          </div>
        </section>
      }

      @defer (on idle) {
        <lfx-pending-actions [pendingActions]="pendingActions()" (actionClick)="handleActionClick()" (castVoteRequested)="castDrawerHost.open($event)" />
      } @placeholder {
        <section class="flex flex-col flex-1" data-testid="project-dashboard-pending-actions-placeholder">
          <div class="flex items-center justify-between mb-4 px-2 h-8">
            <div class="flex items-center gap-2">
              <p-skeleton width="1.125rem" height="1.125rem" borderRadius="4px" />
              <p-skeleton width="9rem" height="1rem" />
            </div>
          </div>
          <div class="flex flex-col gap-3 px-2">
            <p-skeleton width="100%" height="140px" />
          </div>
        </section>
      }
    </div>

    @if (selectedProject()?.uid; as uid) {
      <lfx-dashboard-sidebar [projectUid]="uid" [staffHeading]="staffHeading()" />
    }
  </div>
</div>

<lfx-dashboard-cast-drawer-host #castDrawerHost (voteSubmitted)="handleVoteSubmitted()" />
