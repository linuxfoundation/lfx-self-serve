@if (hasItems()) {
  <div class="flex flex-col gap-3 rounded-lg border border-gray-200 bg-white p-5" data-testid="events-attention-section">
    <!-- Header -->
    <div class="flex items-center gap-2.5">
      <span class="inline-flex h-7 w-7 items-center justify-center rounded-lg bg-amber-100 text-amber-600">
        <i class="fa-light fa-bolt text-sm" aria-hidden="true"></i>
      </span>
      <div class="flex flex-col gap-0.5">
        <h3 class="text-sm font-semibold text-gray-900">Needs attention</h3>
        <span class="text-xs text-gray-400">Upcoming events where marketing can move the needle</span>
      </div>
    </div>

    <!-- Items -->
    <div class="flex flex-col gap-2.5" role="list">
      @for (item of items(); track item.id) {
        <div
          class="relative flex flex-col gap-3 rounded-lg border border-gray-200 py-3 pl-5 pr-4 md:flex-row md:items-center md:justify-between"
          role="listitem"
          [attr.data-testid]="'events-attention-item-' + item.id">
          <span
            class="absolute bottom-2 left-0 top-2 w-[3px] rounded-full"
            [ngClass]="{ 'bg-red-500': item.severity === 'critical', 'bg-amber-500': item.severity === 'warning' }"
            aria-hidden="true"></span>

          <div class="flex flex-col gap-1">
            <span
              class="inline-flex w-fit rounded px-2 py-0.5 text-[10px] font-bold tracking-wide"
              [ngClass]="{
                'bg-red-100 text-red-600': item.severity === 'critical',
                'bg-amber-100 text-amber-600': item.severity === 'warning',
              }"
              >{{ item.tag }}</span
            >
            <span class="text-sm font-semibold text-gray-900">{{ item.title }}</span>
            <span class="text-xs text-gray-500">{{ item.detail }}</span>
          </div>

          <div class="flex flex-shrink-0 items-center gap-2">
            @if (item.actionUrl) {
              <a
                [href]="item.actionUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="inline-flex items-center gap-1.5 rounded-lg bg-blue-500 px-3 py-2 text-xs font-semibold text-white hover:bg-blue-600"
                [attr.data-testid]="'events-attention-open-' + item.id">
                <i class="fa-light fa-arrow-up-right-from-square" aria-hidden="true"></i>
                Open event
              </a>
            }
          </div>
        </div>
      }
    </div>
  </div>
}
