<div class="flex flex-col gap-4" data-testid="newsletter-content-step">
  <div>
    <h2 class="text-base font-semibold text-gray-900">Write your newsletter</h2>
    <p class="text-sm text-gray-500 mt-1">Add a subject line, then build the body from content blocks.</p>
  </div>

  <div class="flex flex-col gap-2">
    <label for="newsletter-subject" class="text-sm font-medium text-gray-700">Subject</label>
    <lfx-input-text
      id="newsletter-subject"
      [form]="form()"
      control="subject"
      placeholder="A short headline your recipients will see in their inbox"
      styleClass="w-full"
      data-testid="newsletter-content-subject">
    </lfx-input-text>
  </div>

  <div class="flex flex-col gap-2 flex-1">
    <label class="text-sm font-medium text-gray-700">Body</label>
    <lfx-newsletter-block-composer
      ngSkipHydration
      [initialLayout]="initialLayout()"
      (layoutChange)="onLayoutChange($event)"
      data-testid="newsletter-content-composer">
    </lfx-newsletter-block-composer>
  </div>
</div>
