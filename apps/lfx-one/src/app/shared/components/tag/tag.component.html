@if (outlined()) {
  <span
    class="inline-flex items-center gap-1.5 border border-gray-200 bg-white text-gray-700 text-xs font-medium px-2 py-0.5 whitespace-nowrap"
    [class.rounded-full]="rounded()"
    [class]="styleClass()">
    @if (dot()) {
      <span class="inline-block h-1.5 w-1.5 shrink-0 rounded-full" [class]="dotBgClass()" aria-hidden="true"></span>
    }
    {{ value() }}
  </span>
} @else {
  <p-tag [value]="value()" [severity]="severity()" [icon]="dot() ? undefined : icon()" [rounded]="rounded()" [styleClass]="styleClass()">
    @if (dot()) {
      <span class="inline-block h-1.5 w-1.5 shrink-0 rounded-full bg-current" aria-hidden="true"></span>
    }
  </p-tag>
}
