<span
  class="relative flex flex-shrink-0 items-center justify-center overflow-hidden rounded-full font-semibold text-white"
  [class]="containerClass()"
  aria-hidden="true"
  data-testid="person-avatar">
  @if (resolvedInitials()) {
    <span data-testid="person-avatar-initials">{{ resolvedInitials() }}</span>
  } @else {
    <i class="fa-light fa-user" aria-hidden="true" data-testid="person-avatar-icon"></i>
  }
  @if (displayImage()) {
    <img
      [src]="avatarUrl()"
      alt=""
      loading="lazy"
      class="absolute inset-0 h-full w-full object-cover"
      (error)="onImageError()"
      data-testid="person-avatar-image" />
  }
</span>
